services:
  - type: web
    name: oneulbada-demo
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: STORE_NAME
        value: 데모수산
      - key: STORE_PRIMARY_PHONE
        value: 010-1234-5678
      - key: STORE_SECONDARY_PHONE
        value: 010-2345-6789
      - key: STORE_BANK_NAME
        value: 신한은행
      - key: STORE_BANK_ACCOUNT
        value: 110-123-456789
      - key: STORE_BANK_HOLDER
        value: 오늘바다
      - key: STORE_ADDRESS_LINE1
        value: 서울시 동작구 예시로 123 수산타운 1층
      - key: STORE_ADDRESS_LINE2
        value: A동 12호
      - key: STORE_BUSINESS_HOURS_NOTE
        value: 월~금 05:00~17:00 / 토 05:00~18:00 / 일 06:00~17:00
